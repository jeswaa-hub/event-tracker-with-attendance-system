<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-in | Event Intelligence System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .glass-form { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .signature-pad { border: 2px dashed #E2E8F0; border-radius: 1rem; background: #fff; cursor: crosshair; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-white">

    <div id="checkinContainer" class="w-full max-w-xl space-y-8 animate-[fadeIn_0.6s_ease-out]">
        <!-- Event Header Card -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl shadow-blue-500/5 border border-slate-100 space-y-4 text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto shadow-xl shadow-blue-500/20 mb-6">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            </div>
            <h1 id="eventTitle" class="text-3xl font-black text-slate-900 tracking-tight uppercase">Loading Event...</h1>
            <p id="eventDetails" class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em]">Please provide your details to check-in</p>
        </div>

        <!-- Attendance Form -->
        <form id="checkinForm" class="bg-white rounded-[2.5rem] p-10 shadow-2xl shadow-blue-500/5 border border-slate-100 space-y-8 hidden">
            <div id="formFields" class="grid grid-cols-1 gap-6">
                <!-- Dynamic Fields will be injected here -->
            </div>

            <!-- Signature Section -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Digital Signature</label>
                <div class="relative">
                    <canvas id="signaturePad" class="signature-pad w-full h-40"></canvas>
                    <button type="button" onclick="clearSignature()" class="absolute bottom-3 right-3 p-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-lg transition-all text-[10px] font-black uppercase tracking-widest">Clear</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-xs uppercase tracking-[0.2em] py-6 rounded-2xl shadow-2xl shadow-blue-500/20 active:scale-95 transition-all duration-300 flex items-center justify-center space-x-3">
                <span>Confirm Attendance</span>
                <div id="btnLoader" class="hidden">
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
            </button>
        </form>

        <!-- Success Message -->
        <div id="successView" class="bg-white rounded-[2.5rem] p-12 shadow-2xl shadow-emerald-500/5 border border-slate-100 text-center space-y-6 hidden">
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mx-auto shadow-xl shadow-emerald-500/20">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Check-in Successful!</h2>
            <p class="text-slate-500 font-bold text-sm leading-relaxed">Thank you for attending. Your attendance has been recorded in our system.</p>
            <button onclick="window.location.reload()" class="text-blue-600 font-black text-[10px] uppercase tracking-widest hover:underline">Submit another response</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let signaturePad, canvas, ctx, isDrawing = false;
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        const SHEET_NAME = "Attendance Form";
        let eventName = "";

        // Initialize Form
        async function initCheckin() {
            if (!eventId) {
                document.getElementById('eventTitle').innerText = "Invalid Access";
                document.getElementById('eventDetails').innerText = "Please use a valid check-in link.";
                return;
            }

            try {
                // Fetch Event Data to get Name
                const events = await getFullSheetData("Events");
                const targetEvent = events.data.find(e => (e["Event ID"] || e["ID"]) == eventId);
                
                if (!targetEvent) throw new Error("Event not found");
                
                eventName = targetEvent["Description/Title"] || targetEvent["Event Name"];
                document.getElementById('eventTitle').innerText = eventName;
                document.getElementById('checkinForm').classList.remove('hidden');

                // Generate Fields from Attendance Schema
                const attendanceData = await getFullSheetData(SHEET_NAME);
                const schema = attendanceData.headers;
                const container = document.getElementById('formFields');

                schema.forEach(col => {
                    const low = col.toLowerCase();
                    if (low.includes('timestamp') || low.includes('signature') || low.includes('event')) return;

                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'space-y-2';
                    
                    let inputHtml = `<input type="text" name="${col}" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-600 transition-all font-bold text-slate-700">`;
                    
                    if (low.includes('email')) inputHtml = `<input type="email" name="${col}" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-600 transition-all font-bold text-slate-700">`;
                    if (low.includes('age')) inputHtml = `<input type="number" name="${col}" required class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-600 transition-all font-bold text-slate-700">`;
                    if (low === 'sex' || low === 'gender') inputHtml = `<select name="${col}" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-600 transition-all font-bold text-slate-700 appearance-none"><option value="Male">Male</option><option value="Female">Female</option></select>`;

                    fieldDiv.innerHTML = `<label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">${col}</label>${inputHtml}`;
                    container.appendChild(fieldDiv);
                });

                initSignature();
            } catch (err) {
                console.error(err);
                document.getElementById('eventTitle').innerText = "Access Error";
                document.getElementById('eventDetails').innerText = err.message;
            }
        }

        // Signature Pad Logic
        function initSignature() {
            canvas = document.getElementById('signaturePad');
            ctx = canvas.getContext('2d');
            
            // Adjust for DPI
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
            const move = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
            const end = () => { isDrawing = false; };

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', move);
            canvas.addEventListener('touchend', end);
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Handle Submission
        document.getElementById('checkinForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('btnLoader');
            
            btn.disabled = true;
            loader.classList.remove('hidden');

            const payload = { 
                action: "create", 
                sheetName: SHEET_NAME,
                Timestamp: new Date().toISOString(),
                Event: eventName,
                Signature: canvas.toDataURL('image/png')
            };

            const formData = new FormData(e.target);
            formData.forEach((val, key) => payload[key] = val);

            try {
                const res = await postToGAS(payload);
                if (res.status === "success") {
                    document.getElementById('checkinForm').classList.add('hidden');
                    document.getElementById('successView').classList.remove('hidden');
                    document.getElementById('eventDetails').innerText = "Session complete";
                } else {
                    alert("Error: " + res.message);
                    btn.disabled = false;
                    loader.classList.add('hidden');
                }
            } catch (err) {
                alert("Submission failed. Please check your connection.");
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        };

        window.addEventListener('DOMContentLoaded', initCheckin);
    </script>
</body>
</html>
